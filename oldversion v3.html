<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Feedback Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EEEDE8;
    --border: rgba(0,0,0,0.08); --text: #1A1917; --text-muted: #6B6963; --text-faint: #A8A59E;
    --accent: #1B4FD8; --accent-bg: #EEF2FF;
    --green: #166534; --green-bg: #DCFCE7;
    --amber: #92400E; --amber-bg: #FEF3C7;
    --red: #991B1B; --red-bg: #FEE2E2;
    --gray: #374151; --gray-bg: #F3F4F6;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-left h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
  .header-left p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .updated-pill { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-faint); background: var(--surface2); padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); }
  main { padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .metric-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-value { font-size: 32px; font-weight: 300; letter-spacing: -0.02em; font-family: 'DM Mono', monospace; }
  .metric-sub { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1.6fr; gap: 12px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { background: var(--surface2); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint); padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.done td { opacity: 0.4; }
  tr:hover td { background: var(--bg); }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 100px; white-space: nowrap; }
  .b-dev   { background: var(--accent-bg); color: var(--accent); }
  .b-comm  { background: var(--green-bg);  color: var(--green); }
  .b-int   { background: var(--amber-bg);  color: var(--amber); }
  .b-other { background: var(--gray-bg);   color: var(--gray); }
  .b-yes   { background: var(--green-bg);  color: var(--green); }
  .b-no    { background: var(--red-bg);    color: var(--red); }
  .b-hi    { background: var(--red-bg);    color: var(--red); }
  .b-mid   { background: var(--amber-bg);  color: var(--amber); }
  .b-lo    { background: var(--green-bg);  color: var(--green); }
  @media (max-width: 900px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

</header>

<main>
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Total items</div><div class="metric-value" id="mTotal">—</div><div class="metric-sub">across all brands</div></div>
    <div class="metric-card"><div class="metric-label">Completed</div><div class="metric-value" id="mDone" style="color:var(--green)">—</div><div class="metric-sub" id="mDonePct">—</div></div>
    <div class="metric-card"><div class="metric-label">Open / In progress</div><div class="metric-value" id="mOpen" style="color:var(--amber)">—</div><div class="metric-sub" id="mOpenPct">—</div></div>
    <div class="metric-card"><div class="metric-label">High impact (4–5)</div><div class="metric-value" id="mHigh" style="color:var(--red)">—</div><div class="metric-sub">business impact score</div></div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">By feedback type</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="typeChart" role="img" aria-label="Doughnut chart of feedback by type"></canvas></div>
      <div class="legend" id="typeLegend"></div>
    </div>
    <div class="card">
      <div class="card-title">Items by brand</div>
      <div class="chart-wrap" id="brandChartWrap" style="height:200px;"><canvas id="brandChart" role="img" aria-label="Bar chart of feedback by brand"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">All feedback items</div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="done">Completed</button>
      <button class="filter-btn" data-filter="dev">Dev requests</button>
      <button class="filter-btn" data-filter="high">High impact</button>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="width:110px;">Brand</th>
            <th>Feedback</th>
            <th style="width:90px;">Type</th>
            <th style="width:110px;">Action</th>
            <th style="width:55px;">Impact</th>
            <th style="width:80px;">Owner</th>
            <th style="width:65px;">Done</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const allRows = [
  {brand:'Ulta',           feedback:'Daily Ulta Sales – Field Sales',              type:'knowledge', action:'None',                          impact:null, owner:'',          done:true},
  {brand:'Clean Beauty',   feedback:'Report Feedback – Cube Additions',             type:'dev',       action:'Communicate to Customer',        impact:null, owner:'Ryan',       done:true},
  {brand:"Dillard's PBI",  feedback:"Product feedback – keep it simple",            type:'dev',       action:'Communicate to Customer',        impact:5,    owner:'Peter/Chad', done:true},
  {brand:'Vacation',       feedback:'Retailer Dashboard',                           type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Ryan',       done:true},
  {brand:'Hobo',           feedback:'State Map Reporting',                          type:'dev',       action:'None',                          impact:1,    owner:'Jeff',       done:false},
  {brand:'Velcro',         feedback:'Feature Request',                              type:'dev',       action:'None',                          impact:1,    owner:'Jeff',       done:false},
  {brand:'Virtue Labs',    feedback:'New Calcs in Cube',                            type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Ryan',       done:false},
  {brand:'Vacation',       feedback:'Scorecard Report (1)',                          type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter/Chad', done:false},
  {brand:'Vacation',       feedback:'Scorecard Report (2)',                          type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Ryan',       done:false},
  {brand:'Vacation',       feedback:'Weekly Trend Report',                          type:'dev',       action:'Communicate to Customer',        impact:5,    owner:'Ryan',       done:true},
  {brand:'Europarfumes',   feedback:'Scorecard Report',                             type:'dev',       action:'Internal',                       impact:5,    owner:'Peter',      done:false},
  {brand:'Venus PBI',      feedback:'OOS Report',                                   type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Ryan',       done:false},
  {brand:'Conair',         feedback:'Ulta Reporting – add decimal places',          type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter',      done:false},
  {brand:'Conair',         feedback:'Ulta Reporting – custom names',                type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter',      done:false},
  {brand:'Conair',         feedback:'Ulta Reporting – BOPISS vs standard online',   type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter',      done:false},
  {brand:'Conair',         feedback:'Ulta Reporting – live data / PBI logon',       type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter/Chad', done:false},
  {brand:'Europerfumes',   feedback:'Venus Reporting',                              type:'dev',       action:'Communicate to Customer',        impact:1,    owner:'Peter/Chad', done:false},
  {brand:'Forma',          feedback:'Data Lake Access',                             type:'other',     action:'Communicate to Customer',        impact:null, owner:'Peter/Chad', done:false},
  {brand:'Huda Kayali',    feedback:'Report Request – PBI reports',                 type:'dev',       action:'Communicate to Customer',        impact:null, owner:'',           done:false},
  {brand:'Clean Beauty',   feedback:'New Metrics',                                  type:'dev',       action:null,                            impact:null, owner:'',           done:false},
  {brand:'Venus PBI',      feedback:'EDI – Internal Process Update',                type:'internal',  action:'Internal Process Update',        impact:null, owner:'Jeff',       done:false},
  {brand:'Venus PBI',      feedback:'Semantic Models – Internal Process Update',    type:'internal',  action:'Internal Process Update',        impact:null, owner:'Jeff',       done:false},
  {brand:'LP',             feedback:'Retailer Portal Lowes',                        type:'other',     action:'Cancellation Documentation',     impact:null, owner:'',           done:false},
  {brand:'AB',             feedback:'Venus CTI Reporting – report speed',           type:'dev',       action:'Communicate to Customer',        impact:null, owner:'',           done:false},
  {brand:'Europerfumes',   feedback:'Report Personalization',                       type:'dev',       action:'Communicate to Customer',        impact:null, owner:'',           done:false},
  {brand:'Conair',         feedback:'Prod Dev review during build',                 type:'dev',       action:'Prod Dev to review during build', impact:3,   owner:'Peter/Chad', done:true},
];

function typeBadge(t) {
  const m = {dev:['Dev request','b-dev'], internal:['Internal','b-int'], knowledge:['Knowledge','b-comm'], other:['Other','b-other']};
  const [label,cls] = m[t]||['Other','b-other'];
  return `<span class="badge ${cls}">${label}</span>`;
}
function impactBadge(i) {
  if (i===null||i===undefined) return '<span style="color:var(--text-faint);">—</span>';
  const cls = i>=4?'b-hi':i>=3?'b-mid':'b-lo';
  return `<span class="badge ${cls}">${i}</span>`;
}

function renderTable(filter) {
  let rows = allRows;
  if (filter==='open')  rows = allRows.filter(r=>!r.done);
  if (filter==='done')  rows = allRows.filter(r=>r.done);
  if (filter==='dev')   rows = allRows.filter(r=>r.type==='dev');
  if (filter==='high')  rows = allRows.filter(r=>r.impact>=4);
  const body = document.getElementById('tableBody');
  if (!rows.length) { body.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-faint);">No items match this filter.</td></tr>'; return; }
  body.innerHTML = rows.map(r=>`
    <tr class="${r.done?'done':''}">
      <td style="font-weight:500;font-size:12px;">${r.brand}</td>
      <td style="max-width:260px;">${r.feedback}</td>
      <td>${typeBadge(r.type)}</td>
      <td style="font-size:12px;color:var(--text-muted);">${r.action||'—'}</td>
      <td style="text-align:center;">${impactBadge(r.impact)}</td>
      <td style="font-size:12px;color:var(--text-muted);">${r.owner||'—'}</td>
      <td style="text-align:center;">${r.done?'<span class="badge b-yes">Yes</span>':'<span class="badge b-no">No</span>'}</td>
    </tr>`).join('');
}

function updateMetrics() {
  const total = allRows.length;
  const done  = allRows.filter(r=>r.done).length;
  const open  = total-done;
  const high  = allRows.filter(r=>r.impact>=4).length;
  document.getElementById('mTotal').textContent = total;
  document.getElementById('mDone').textContent  = done;
  document.getElementById('mDonePct').textContent = Math.round(done/total*100)+'% complete';
  document.getElementById('mOpen').textContent  = open;
  document.getElementById('mOpenPct').textContent = Math.round(open/total*100)+'% pending';
  document.getElementById('mHigh').textContent  = high;
}

function renderTypeChart() {
  const counts={dev:0,internal:0,knowledge:0,other:0};
  allRows.forEach(r=>{if(counts[r.type]!==undefined)counts[r.type]++;else counts.other++;});
  const labels=['Dev request','Internal','Knowledge','Other'];
  const values=[counts.dev,counts.internal,counts.knowledge,counts.other];
  const colors=['#1B4FD8','#D97706','#059669','#6B7280'];
  new Chart(document.getElementById('typeChart'),{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw}}}}
  });
  document.getElementById('typeLegend').innerHTML=labels.map((l,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} (${values[i]})</span>`).join('');
}

function renderBrandChart() {
  const counts={};
  allRows.forEach(r=>{counts[r.brand]=(counts[r.brand]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const h=Math.max(200,sorted.length*36+60);
  document.getElementById('brandChartWrap').style.height=h+'px';
  new Chart(document.getElementById('brandChart'),{
    type:'bar',
    data:{labels:sorted.map(e=>e[0]),datasets:[{data:sorted.map(e=>e[1]),backgroundColor:'#1B4FD8',borderRadius:4,borderWidth:0}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},y:{ticks:{font:{size:11}}}}}
  });
}

document.getElementById('filters').addEventListener('click',e=>{
  if(!e.target.dataset.filter) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderTable(e.target.dataset.filter);
});

updateMetrics();
renderTypeChart();
renderBrandChart();
renderTable('all');
</script>
</body>
</html>
