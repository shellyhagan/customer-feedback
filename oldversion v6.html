<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Feedback — Accelerated Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --navy:#0f2744;--cream:#faf9f6;--surface:#fff;
  --border:#e2ddd6;--text:#1a1714;--text-muted:#8a8278;
  --dev-bg:#eef2ff;--dev:#1B4FD8;
  --int-bg:#fef3c7;--int:#92400E;
  --know-bg:#dcfce7;--know:#166534;
  --other-bg:#f3f4f6;--other:#374151;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
header{background:var(--navy);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-img{background:#fff;border-radius:6px;padding:4px 8px;display:flex;align-items:center;}
.logo-img img{height:28px;display:block;}
.logo-text{color:#94a3b8;font-size:13px;font-weight:400;border-left:1px solid rgba(255,255,255,.15);padding-left:12px;}
.header-right{display:flex;align-items:center;gap:12px;}
.last-updated{color:#94a3b8;font-size:11px;font-family:'DM Mono',monospace;}
.refresh-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#cbd5e1;font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 14px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
.refresh-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:#4ade80;font-family:'DM Mono',monospace;}
.pulse{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
main{padding:24px 28px;max-width:1400px;margin:0 auto;}
.error-msg{background:#fde8e8;border:1px solid #fca5a5;border-radius:var(--r);padding:14px 18px;margin-bottom:18px;font-size:13px;color:#7b1d1d;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.metric-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px;}
.metric-val{font-size:28px;font-weight:700;letter-spacing:-.04em;line-height:1;}
.metric-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}
.c-navy{color:var(--navy);} .c-red{color:#991b1b;} .c-amber{color:#92400e;} .c-green{color:#166534;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.filter-btn:hover{background:#f0ede8;}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.charts-row{display:grid;grid-template-columns:1fr 1.6fr;gap:12px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:14px;}
.chart-wrap{position:relative;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.done-row td{opacity:.4;}
tr:hover td{background:#faf9f6;}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:100px;white-space:nowrap;}
.b-dev{background:var(--dev-bg);color:var(--dev);}
.b-int{background:var(--int-bg);color:var(--int);}
.b-know{background:var(--know-bg);color:var(--know);}
.b-other{background:var(--other-bg);color:var(--other);}
.b-yes{background:#dcfce7;color:#166534;}
.b-no{background:#fee2e2;color:#991b1b;}
.b-hi{background:#fee2e2;color:#991b1b;}
.b-mid{background:#fef3c7;color:#92400e;}
.b-lo{background:#dcfce7;color:#166534;}
footer{max-width:1400px;margin:0 auto;padding:14px 28px 28px;display:flex;align-items:center;gap:8px;}
footer a{font-size:12px;color:var(--text-muted);text-decoration:none;transition:color .15s;}
footer a:hover{color:var(--text);}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:13px;color:var(--text-muted);}
@media(max-width:900px){.metrics-grid{grid-template-columns:repeat(2,1fr);}.charts-row{grid-template-columns:1fr;}header{padding:0 16px;}main{padding:16px;}}
</style>
</head>

  <div class="metrics-grid">
    <div class="metric"><div class="metric-label">Total items</div><div class="metric-val c-navy" id="mTotal">—</div><div class="metric-sub">across all brands</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-val c-green" id="mDone">—</div><div class="metric-sub" id="mDonePct">—</div></div>
    <div class="metric"><div class="metric-label">Open / In progress</div><div class="metric-val c-amber" id="mOpen">—</div><div class="metric-sub" id="mOpenPct">—</div></div>
    <div class="metric"><div class="metric-label">High impact (4–5)</div><div class="metric-val c-red" id="mHigh">—</div><div class="metric-sub">business impact score</div></div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">By feedback type</div>
      <div class="chart-wrap" style="height:200px;"><canvas id="typeChart" role="img" aria-label="Feedback by type"></canvas></div>
      <div class="legend" id="typeLegend"></div>
    </div>
    <div class="card">
      <div class="card-title">Open items by brand</div>
      <div class="chart-wrap" id="brandChartWrap" style="height:200px;"><canvas id="brandChart" role="img" aria-label="Open items by brand"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">All feedback items</div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="open">Open</button>
      <button class="filter-btn" data-filter="done">Completed</button>
      <button class="filter-btn" data-filter="dev">Dev requests</button>
      <button class="filter-btn" data-filter="high">High impact</button>
    </div>
    <div id="tableContainer">
      <div class="loading"><div class="spinner"></div><span class="loading-text">Fetching live data...</span></div>
    </div>
  </div>
</main>

<footer>
  <svg viewBox="0 0 24 24" fill="none" stroke="#8a8278" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  <a href="https://docs.google.com/spreadsheets/d/1fLV7bIqkjDKZ7c1TkO4OD4UnHC_8IOMQvK0HvybImuI/edit" target="_blank">View source: Customer Feedback Tracking (Google Sheet)</a>
</footer>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxEZMRTL03TWwqsv-9mDfCCSqhiSXOzR7JUCPTvFW8GiJwLzoJD_rjz7czVKlYcvAA/exec';

let allRows = [];
let typeChartInst = null;
let brandChartInst = null;
let currentFilter = 'all';

function normalizeRow(r) {
  const g = (...keys) => { for (const k of keys) { const v = r[k]; if (v !== undefined && v !== null && String(v).trim()) return String(v).trim(); } return ''; };
  const brand    = g('Brand Account','Brand','brand_account','brand');
  const feedback = g('Feedback','feedback');
  const type     = g('Type','type','Feedback Type');
  const action   = g('Action','action');
  const impRaw   = g('Business Impact 1-5','Business Impact','impact','business_impact_15');
  const impact   = parseInt(impRaw) || null;
  const owner    = g('Owner','owner');
  const completed = g('Completed','completed','Done','done');
  const notes    = g('Notes','notes');

  const doneVal = completed.toLowerCase().trim();
  const done = doneVal === 'yes' || doneVal === 'true' || doneVal === '1';

  let typeNorm = 'other';
  const tl = type.toLowerCase();
  if (tl.includes('dev') || tl.includes('request for dev')) typeNorm = 'dev';
  else if (tl.includes('internal')) typeNorm = 'internal';
  else if (tl.includes('knowledge')) typeNorm = 'knowledge';

  return { brand, feedback, type: typeNorm, action, impact, owner, done, notes };
}

function typeBadge(t) {
  const m = { dev:['Dev request','b-dev'], internal:['Internal','b-int'], knowledge:['Knowledge','b-know'], other:['Other','b-other'] };
  const [label, cls] = m[t] || ['Other','b-other'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function impactBadge(i) {
  if (!i) return '<span style="color:#8a8278;">—</span>';
  const cls = i >= 4 ? 'b-hi' : i >= 3 ? 'b-mid' : 'b-lo';
  return `<span class="badge ${cls}">${i}</span>`;
}

function renderTable(filter) {
  currentFilter = filter;
  let rows = allRows;
  if (filter === 'open')  rows = allRows.filter(r => !r.done);
  if (filter === 'done')  rows = allRows.filter(r => r.done);
  if (filter === 'dev')   rows = allRows.filter(r => r.type === 'dev');
  if (filter === 'high')  rows = allRows.filter(r => r.impact >= 4);

  const container = document.getElementById('tableContainer');
  if (!rows.length) {
    container.innerHTML = '<p style="text-align:center;padding:40px;color:#8a8278;font-size:13px;">No items match this filter.</p>';
    return;
  }
  container.innerHTML = `<div style="overflow-x:auto;"><table>
    <thead><tr>
      <th style="width:110px;">Brand</th>
      <th>Feedback</th>
      <th style="width:95px;">Type</th>
      <th style="width:115px;">Action</th>
      <th style="width:55px;">Impact</th>
      <th style="width:80px;">Owner</th>
      <th style="width:65px;">Done</th>
    </tr></thead>
    <tbody>${rows.map(r => `
      <tr class="${r.done ? 'done-row' : ''}">
        <td style="font-weight:500;font-size:12px;">${r.brand||'—'}</td>
        <td style="max-width:260px;">${r.feedback||'—'}</td>
        <td>${typeBadge(r.type)}</td>
        <td style="font-size:12px;color:#8a8278;">${r.action||'—'}</td>
        <td style="text-align:center;">${impactBadge(r.impact)}</td>
        <td style="font-size:12px;color:#8a8278;">${r.owner||'—'}</td>
        <td style="text-align:center;">${r.done
          ? '<span class="badge b-yes">Yes</span>'
          : '<span class="badge b-no">No</span>'}</td>
      </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMetrics() {
  const total = allRows.length;
  const done  = allRows.filter(r => r.done).length;
  const open  = total - done;
  const high  = allRows.filter(r => r.impact >= 4).length;
  document.getElementById('mTotal').textContent = total;
  document.getElementById('mDone').textContent  = done;
  document.getElementById('mDonePct').textContent = total ? Math.round(done/total*100)+'% complete' : '—';
  document.getElementById('mOpen').textContent  = open;
  document.getElementById('mOpenPct').textContent = total ? Math.round(open/total*100)+'% pending' : '—';
  document.getElementById('mHigh').textContent  = high;
}

function renderCharts() {
  const counts = {dev:0,internal:0,knowledge:0,other:0};
  allRows.forEach(r => { counts[r.type] = (counts[r.type]||0) + 1; });
  const labels = ['Dev request','Internal','Knowledge','Other'];
  const values = [counts.dev, counts.internal, counts.knowledge, counts.other];
  const colors = ['#1B4FD8','#D97706','#059669','#6B7280'];
  if (typeChartInst) typeChartInst.destroy();
  typeChartInst = new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+ctx.raw}} } }
  });
  document.getElementById('typeLegend').innerHTML = labels.map((l,i) =>
    `<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l} (${values[i]})</span>`).join('');

  const brandCounts = {};
  allRows.filter(r => !r.done).forEach(r => { if (r.brand) brandCounts[r.brand] = (brandCounts[r.brand]||0)+1; });
  const sorted = Object.entries(brandCounts).sort((a,b) => b[1]-a[1]);
  const h = Math.max(200, sorted.length * 36 + 60);
  document.getElementById('brandChartWrap').style.height = h + 'px';
  if (brandChartInst) brandChartInst.destroy();
  brandChartInst = new Chart(document.getElementById('brandChart'), {
    type: 'bar',
    data: { labels: sorted.map(e=>e[0]), datasets: [{ data: sorted.map(e=>e[1]), backgroundColor:'#1B4FD8', borderRadius:4, borderWidth:0 }] },
    options: { indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{ x:{ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}}, y:{ticks:{font:{size:11}}} } }
  });
}

async function loadData() {
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.disabled = true;
  icon.style.animation = 'spin .7s linear infinite';
  document.getElementById('liveBadge').style.display = 'none';
  document.getElementById('lastUpdated').textContent = 'Refreshing...';
  document.getElementById('tableContainer').innerHTML =
    '<div class="loading"><div class="spinner"></div><span class="loading-text">Fetching live data...</span></div>';

  try {
    const res = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    if (!Array.isArray(raw) || !raw.length) throw new Error('No data returned');

    allRows = raw.map(normalizeRow).filter(r => r.brand || r.feedback);
    if (!allRows.length) throw new Error('No valid rows after parsing');

    renderMetrics();
    renderCharts();
    renderTable(currentFilter);

    document.getElementById('liveBadge').style.display = 'flex';
    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
      ' at ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

  } catch(err) {
    console.error(err);
    document.getElementById('lastUpdated').textContent = 'Error — ' + err.message;
    document.getElementById('tableContainer').innerHTML =
      '<div class="error-msg"><strong>Could not load data.</strong> Check that the Google Apps Script is deployed as a web app with access set to \'Anyone\'.</div>';
  } finally {
    btn.disabled = false;
    icon.style.animation = '';
  }
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.dataset.filter) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  if (allRows.length) renderTable(e.target.dataset.filter);
});

loadData();
</script>
</body>
</html>
